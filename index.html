<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POWERTRONIZ | Servicio Técnico</title>
    <style>
        /* --- VARIABLES Y ESTILOS BASE --- */
        :root {
            --primary-orange: #ff9900;
            --primary-yellow: #ffcc00;
            --background-dark: #121212;
            --text-light: #e0e0e0;
            --card-bg: #1e1e1e;
            --accent-green: #2ecc71;
            --modal-overlay: rgba(0, 0, 0, 0.95);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--background-dark);
            color: var(--text-light);
            overflow-x: hidden;
            width: 100%;
        }

        /* --- CABECERA --- */
        header {
            background: url('lion_logo.png') no-repeat center;
            background-size: contain;
            padding: 150px 0; 
            border-bottom: 5px solid var(--primary-yellow);
            width: 100%;
            margin-bottom: 20px;
        }

        .brand-title-section { text-align: center; width: 100%; padding: 0 10px; box-sizing: border-box; }
        .brand-title-section h1 { color: white; font-size: 2.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        .brand-logos {
            background: #000; display: flex; width: 100%; justify-content: center;
            align-items: center; flex-wrap: wrap; gap: 15px; padding: 20px 10px; margin: 15px 0;
            border-top: 5px solid var(--primary-orange); border-bottom: 5px solid var(--primary-orange);
            box-sizing: border-box;
        }
        .brand-logos img { height: 25px; max-width: 100px; object-fit: contain; filter: brightness(1.1); }

        /* --- GRID DE BIBLIOTECA --- */
        .container { width: 100%; max-width: 100%; margin: 0; padding: 0 15px; box-sizing: border-box; }
        .tech-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .tech-card {
            background: var(--card-bg); border: 1px solid #333; padding: 15px 5px;
            border-radius: 10px; cursor: pointer; transition: 0.2s; text-align: center;
        }
        .tech-card:active { transform: scale(0.95); }
        .tech-card span { display: block; font-weight: bold; font-size: 0.8rem; color: white; }
        .tech-card small { color: var(--primary-yellow); font-size: 0.6rem; text-transform: uppercase; }

        /* --- MODAL DE BIBLIOTECA (TEXTO/FOTOS) --- */
        .modal {
            display: none; position: fixed; z-index: 10001;
            left: 0; top: 0; width: 100%; height: 100%;
            background: var(--modal-overlay); overflow-y: auto; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card-bg); margin: 10% auto; padding: 25px;
            width: 85%; max-width: 500px; border-radius: 20px;
            border: 2px solid var(--primary-orange); position: relative;
        }

        /* --- MODAL DE VIDEO GRANDE (CONFIGURACIÓN MUDO) --- */
        .video-modal {
            display: none; position: fixed; z-index: 20000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); align-items: center; justify-content: center;
        }
        .video-container { position: relative; width: 90%; max-width: 800px; }
        .video-modal video { width: 100%; border: 3px solid var(--primary-orange); border-radius: 15px; background: #000; }

        /* ELIMINAR OPCIÓN DE SONIDO */
        video::-webkit-media-controls-mute-button,
        video::-webkit-media-controls-volume-slider {
            display: none !important;
        }

        .btn-cerrar-video {
            position: absolute; top: -50px; right: 0;
            background: var(--primary-orange); color: black;
            border: none; padding: 10px 20px; font-weight: bold;
            border-radius: 5px; cursor: pointer; font-size: 16px;
            box-shadow: 0 0 15px rgba(255,153,0,0.4);
        }

        /* --- SLIDER DE VIDEOS (MINIATURAS VIVAS) --- */
        .slider {
            width: 100%; overflow: hidden; background: var(--card-bg);
            padding: 15px 0; margin: 20px 0;
            border-top: 2px solid var(--primary-orange); border-bottom: 2px solid var(--primary-orange);
        }
        .slider-track { display: flex; animation: scroll 35s linear infinite; }
        .slide { width: 220px; padding: 0 10px; flex-shrink: 0; }
        
        .video-mini {
            width: 100%; height: 125px; object-fit: cover;
            border-radius: 10px; cursor: pointer; border: 2px solid #444;
            background: #000; transition: 0.3s;
        }
        .video-mini:hover { border-color: var(--primary-orange); transform: scale(1.03); }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } 
        }

        /* --- BOTONES Y OTROS --- */
        .call-to-action {
            display: block; background: linear-gradient(to right, var(--primary-orange), var(--primary-yellow));
            color: #000; padding: 18px 10px; border-radius: 50px; text-align: center;
            font-weight: bold; text-decoration: none; text-transform: uppercase;
            margin: 20px auto; width: 90%; font-size: 0.9rem;
        }
        .wa-float { position: fixed; width: 60px; height: 60px; bottom: 20px; right: 20px; background-color: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .wa-float img { width: 70%; }
        footer { background-color: #000; padding: 25px 0; text-align: center; border-top: 3px solid var(--primary-orange); margin-top: 30px; }
    </style>
</head>
<body>

<header></header>

<div class="brand-title-section">
  <h1>POWERTRONIZ</h1>
  <p>Servicio Técnico Especializado</p>
  <div class="brand-logos">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/20/LG_symbol.svg" alt="LG">
    <img src="samsung.png" alt="Samsung">
    <img src="sony.png" alt="Sony">
    <img src="hisense.png" alt="Hisense">
    <img src="tcl.png" alt="TCL">
  </div>
</div>

<section class="container">
    <div class="description-section">
        <h2 style="color: var(--primary-yellow); text-align: center;">Biblioteca Técnica</h2>
        <div class="tech-grid">
            <div class="tech-card" onclick="openTech('plasma')"><small>SISTEMA</small><span>TV PLASMA</span></div>
            <div class="tech-card" onclick="openTech('lcd')"><small>SISTEMA</small><span>TV LCD</span></div>
            <div class="tech-card" onclick="openTech('led')"><small>SISTEMA</small><span>TV LED </span></div>
        </div>
    </div>
</section>

<section class="container">
    <h3 style="color: var(--primary-orange); text-align: center;">Fallas en Tiempo Real</h3>
    <div class="slider">
        <div class="slider-track" id="carruselFallas"></div>
    </div>
</section>

<div id="videoModal" class="video-modal" onclick="cerrarVideoFuera(event)">
    <div class="video-container">
        <button class="btn-cerrar-video" onclick="cerrarVideo()">CERRAR X</button>
        <video id="reproductor" controls playsinline muted controlsList="nodownload noplaybackrate">
            <source src="" type="video/mp4">
        </video>
    </div>
</div>

<div id="techModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; right:15px; top:10px; font-size:30px; cursor:pointer;" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<a href="https://wa.me/51963514184" class="call-to-action"> WhatsApp Especializado 📞</a>

<a href="https://wa.me/51963514184" class="wa-float" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="Whatsapp">
</a>

<footer>
    <p>&copy; 2026 POWERTRONIZ | Villa El Salvador y Lima Metropolitana.</p>
</footer>

<script>
    // --- BASE DE DATOS DE VIDEOS ---
    const videos = [
        "video1.mp4", "video2.mp4", "video3.mp4", "video4.mp4", 
        "video5.mp4", "video6.mp4", "video7.mp4", "video8.mp4"
    ];

    // Cargar el carrusel con videos mudos y automáticos
    function inicializarCarrusel() {
        const track = document.getElementById('carruselFallas');
        let html = "";
        videos.forEach(vid => {
            html += `
            <div class="slide">
                <video class="video-mini" autoplay muted loop playsinline onclick="abrirVideo('${vid}')">
                    <source src="${vid}" type="video/mp4">
                </video>
            </div>`;
        });
        track.innerHTML = html + html; 
        track.style.width = `calc(220px * ${videos.length * 2})`;
    }

    // Abrir video grande - MUDO Y SIN CONTROLES DE AUDIO
    function abrirVideo(ruta) {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('reproductor');
        video.src = ruta;
        video.muted = true; // Asegura silencio absoluto
        modal.style.display = 'flex';
        video.play();
    }

    // Cerrar video
    function cerrarVideo() {
        const modal = document.getElementById('videoModal');
        const video = document.getElementById('reproductor');
        video.pause();
        video.src = "";
        modal.style.display = 'none';
    }

    // Cerrar al hacer clic fuera del recuadro del video
    function cerrarVideoFuera(event) {
        if (event.target.id === 'videoModal') cerrarVideo();
    }

    // Biblioteca Técnica
    const data = {
        plasma: { title: "TV Plasma", desc: "Información técnica de sistemas Plasma." },
        lcd: { title: "TV LCD", desc: "Esquemas y partes de pantallas LCD." },
        led: { title: "TV LED", desc: "Tecnología de diodos para televisores modernos." }
    };

    function openTech(type) {
        const item = data[type];
        document.getElementById('modalBody').innerHTML = `<h2>${item.title}</h2><p>${item.desc}</p>`;
        document.getElementById('techModal').style.display = 'block';
    }
    function closeModal() { document.getElementById('techModal').style.display = 'none'; }

    window.onload = inicializarCarrusel;
</script>

</body>
</html>
